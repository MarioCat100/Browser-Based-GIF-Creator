<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goated Tiles</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; z-index: 10; }
        .hidden { display: none !important; }
        .btn { width: 80%; max-width: 300px; padding: 20px; margin: 10px; background: #000; color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; }
       #song-list { 
        width: 90%; 
        max-width: 400px;
        height: 300px; /* Limits the height so it doesn't eat the whole page */
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        overflow-y: auto; /* Adds a scrollbar if there are too many songs */
        background: #f4f4f4;
        border-radius: 15px;
        padding: 10px;
        border: 2px solid #000;
    }

    /* Makes the scrollbar look cleaner on Chrome/Safari */
    #song-list::-webkit-scrollbar {
        width: 8px;
    }
    #song-list::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 10px;
    }
    </style>
</head>
<body>

<div id="home-screen" class="overlay">
    <h1 style="letter-spacing: 5px;">GOATED TILES test11</h1>
    <div id="song-list"></div>
</div>

<div id="death-screen" class="overlay hidden">
    <h1 id="fail-text">FAILED</h1>
    <h2 id="final-score">SCORE: 0</h2>
    <button class="btn" onclick="restartGame()">RESTART</button>
    <button class="btn" style="background:#666" onclick="goHome()">HOME</button>
</div>

<script>
let feedbackText = "";
let feedbackColor = "#fff";
let feedbackTimer = 0;    
let mySound, amp, tiles = [], score = 0, gameState = "MENU";
let currentSongUrl = "", speed = 6, alpha = 0;

const mySongs = [
    { name: "Legendary Lovers", url: "./Legendary Lovers.mp3" },
    { name: "Wheels Fall OFF", url: "./Wheels Fall Off.mp3" },
    { name: "Tom Cruise", url: "./Tom Cruise.mp3" },
     { name: "3005", url: "./3005.mp3" },
    { name: "Rather Lie", url: "./RATHER LIE.mp3" }
];

function setup() {
    createCanvas(windowWidth, windowHeight);
    const list = document.getElementById('song-list');
    list.innerHTML = ""; 

    mySongs.forEach(s => {
        // Look up the score for this song
        let savedBest = localStorage.getItem("best_" + s.url) || 0;
        
        let btn = document.createElement('button');
        btn.className = "btn";
        // Show Name + High Score on the button
        btn.innerHTML = `${s.name}<br><span style="font-size: 12px; opacity: 0.7;">Best: ${savedBest}</span>`;
        
        btn.onclick = () => { currentSongUrl = s.url; loadAndStart(); };
        list.appendChild(btn);
    });
    amp = new p5.Amplitude();
}

function loadAndStart() {
    if (mySound) mySound.stop();
    document.getElementById('home-screen').innerHTML = "<h1>LOADING...</h1>";
    mySound = loadSound(currentSongUrl, () => {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('death-screen').classList.add('hidden');
        startGame();
    });
}

function startGame() {
    tiles = []; score = 0; speed = 6; frameCount = 0; gameState = "PLAYING";
    tiles.push(new Tile(floor(random(4))));
    mySound.play();
}

class Tile {
    constructor(lane) {
        this.lane = lane;
        this.w = width / 4;
        this.h = height / 5;
        this.x = this.lane * this.w;
        this.y = -this.h * 2;
        this.once = true;
    }
    move(v, a) { this.y += (v * speed) + a; }
    show() {
        fill(0); stroke(100);
        rect(this.x, this.y, this.w, this.h);
    }
}

function draw() {
    if (gameState !== "PLAYING") return;
    background(255);
    
    alpha = frameCount / 200; 
    let vol = amp.getLevel();
    let varR = vol < 0.2 ? 0.8 : map(vol, 0.4, 1, 0.8, 1.2);

    stroke(220);
    for (let i = 1; i < 4; i++) line(i * width/4, 0, i * width/4, height);

    for (let i = tiles.length - 1; i >= 0; i--) {
        let t = tiles[i];
        t.move(varR, alpha);
        t.show();

        if (t.y > -t.h + 5 && t.once) {
            t.once = false;
            tiles.push(new Tile(floor(random(4))));
        }

        if (t.y > height) triggerGameOver();
    }

    fill(255, 0, 0); 
    noStroke();
    textSize(50);
    textAlign(CENTER);
    text(score, width / 2, 80);
// DRAW THE FEEDBACK POP-UP
    if (feedbackTimer > 0) {
        fill(feedbackColor);
        noStroke();
        textSize(40);
        textAlign(CENTER);
        text(feedbackText, width / 2, height / 2 + 50);
        feedbackTimer--; // This makes it disappear after 25 frames
    }
}

// INPUT HANDLING
function mousePressed() {
    if (gameState !== "PLAYING") return;
    if (getAudioContext().state !== 'running') getAudioContext().resume();
    let clickedLane = floor(mouseX / (width / 4));
    checkHit(clickedLane);
}

function keyPressed() {
    if (gameState !== "PLAYING") return;
    let targetLane = -1;
    if (key === 'a' || key === 'A' || keyCode === LEFT_ARROW) targetLane = 0;
    if (key === 's' || key === 'S' || keyCode === DOWN_ARROW) targetLane = 1;
    if (key === 'w' || key === 'W' || keyCode === RIGHT_ARROW) targetLane = 2;
    if (key === 'd' || key === 'd' || keyCode === UP_ARROW) targetLane = 3; 

    if (targetLane !== -1) checkHit(targetLane);
}

// ONE MASTER CHECKER (Now with Perfect Zones)
function checkHit(lane) {
    let t = tiles[0]; 
    if (t && t.lane === lane) {
        // 1. Keep your existing BUFFER check (t.y + t.h > 100)
        // This ensures WASD and taps feel fast and responsive.
        if (t.y + t.h > 100) {
            
            // 2. NEW: Calculate the distance for the "Perfect" bonus
            // abs(height - (t.y + t.h)) finds how many pixels the tile is from the bottom
            let distFromBottom = abs(height - (t.y + t.h));

            if (distFromBottom < 60) { 
                // PERFECT HIT: Within 60 pixels of the very bottom
                score += 2; 
                showFeedback("PERFECT!", "#f1c40f"); // Gold
            } else {
                // GOOD HIT: It was in the buffer zone, but not "Perfect"
                score += 1;
                showFeedback("GOOD", "#ffffff"); // White
            }
            
            tiles.splice(0, 1);
        } else {
            // You hit it, but it was still too high up the screen
            triggerGameOver();
        }
    } else {
        // Wrong lane!
        triggerGameOver();
    }
}

function triggerGameOver() {
    gameState = "GAMEOVER";
    if (mySound) mySound.stop();
    
    // 1. Create a unique key for this specific song
    let scoreKey = "best_" + currentSongUrl; 
    
    // 2. Get the old high score (default to 0 if it doesn't exist)
    let previousBest = parseInt(localStorage.getItem(scoreKey)) || 0;
    let isNewRecord = false;

    // 3. Check if we beat it
    if (score > previousBest) {
        localStorage.setItem(scoreKey, score);
        isNewRecord = true;
    }

    // 4. Update the Death Screen text
    let failText = isNewRecord ? "NEW HIGH SCORE!" : "FAILED";
    document.getElementById('fail-text').innerText = failText;
    document.getElementById('fail-text').style.color = isNewRecord ? "#2ecc71" : "#e74c3c"; // Green for win, Red for fail
    
    document.getElementById('final-score').innerHTML = `
        SCORE: ${score}<br>
        <span style="font-size: 18px; color: #666;">BEST: ${isNewRecord ? score : previousBest}</span>
    `;
    
    document.getElementById('death-screen').classList.remove('hidden');
}

function restartGame() {
    document.getElementById('death-screen').classList.add('hidden');
    startGame();
}

function goHome() {
    if (mySound) mySound.stop();
    gameState = "MENU";
    document.getElementById('death-screen').classList.add('hidden');
    const home = document.getElementById('home-screen');
    home.classList.remove('hidden');
    home.innerHTML = `<h1 style="letter-spacing: 5px;">GOATED TILES</h1><div id="song-list"></div>`;
    setup();
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
function showFeedback(txt, col) {
    feedbackText = txt;
    feedbackColor = col;
    feedbackTimer = 25; 
}
</script>
</body>
</html>
