<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Goated Tiles">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <title>Goated Tiles</title>
    
    <style>
        :root { --bg: #fff; --text: #000; --gray: #f0f0f0; }

        /* 2. PREVENT BROWSER BOUNCE & ZOOM */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            position: fixed; 
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none; /* Disables all browser gestures */
            user-select: none;
            -webkit-user-select: none;
        }

        canvas { display: block; }

        /* UI Overlays */
        .overlay { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: white; 
            z-index: 10; 
            padding: 20px;
        }

        #game-ui { 
            position: absolute; 
            top: 50px; 
            width: 100%; 
            text-align: center; 
            pointer-events: none; 
            z-index: 5; 
        }

        #score { font-size: 80px; font-weight: 900; color: rgba(0,0,0,0.1); }

        /* Song Library */
        .library-container { width: 100%; max-width: 400px; text-align: center; }
        .song-list { 
            width: 100%; 
            max-height: 40vh; 
            overflow-y: auto; 
            border: 2px solid #000; 
            margin: 20px 0; 
            border-radius: 8px;
        }
        .song-item { 
            padding: 20px; 
            border-bottom: 1px solid var(--gray); 
            font-weight: bold; 
            text-align: left;
            text-transform: uppercase;
        }
        .song-item:active { background: #000; color: #fff; }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
        button { 
            padding: 20px; 
            font-size: 18px; 
            font-weight: bold; 
            background: #000; 
            color: #fff; 
            border: none; 
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-secondary { background: #666; }
        .hidden { display: none !important; }

        input[type="file"] { margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-ui">
    <div id="score">0</div>
</div>

<div id="home-screen" class="overlay">
    <h1 style="letter-spacing: 5px;">GOATED TILES</h1>
    <div class="library-container">
        <div class="song-list" id="library">
            </div>
        <p>OR UPLOAD MP3</p>
        <input type="file" id="audioUpload" accept="audio/*">
    </div>
</div>

<div id="death-screen" class="overlay hidden">
    <h1 id="death-msg">FAILED</h1>
    <h2 id="final-score">SCORE: 0</h2>
    <div class="btn-group">
        <button onclick="startGame()">RETRY</button>
        <button class="btn-secondary" onclick="goHome()">HOME</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // Performance boost
    const homeScreen = document.getElementById('home-screen');
    const deathScreen = document.getElementById('death-screen');
    const scoreEl = document.getElementById('score');
    const libraryEl = document.getElementById('library');
    const audioInput = document.getElementById('audioUpload');

    // CONFIGURATION
    const songLibrary = [
        { title: "Legendary Lovers", url: "./Legendary Lovers.mp3" }
    ];

    let score = 0;
    let tiles = [];
    let gameRunning = false;
    let speed = 7;
    let laneWidth;
    let audio = new Audio();
    let currentSongUrl = "";
    let audioCtx;

    function init() {
        resize();
        loadLibrary();
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        laneWidth = canvas.width / 4;
    }

    function loadLibrary() {
        libraryEl.innerHTML = '';
        songLibrary.forEach(song => {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerText = song.title;
            div.onclick = () => { currentSongUrl = song.url; startGame(); };
            libraryEl.appendChild(div);
        });
    }

    // GAME ENGINE
    function startGame() {
        // Unlock Audio Context for iOS/Android
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();

        homeScreen.classList.add('hidden');
        deathScreen.classList.add('hidden');
        
        audio.src = currentSongUrl;
        audio.currentTime = 0;
        score = 0;
        scoreEl.innerText = "0";
        tiles = [];
        speed = 8; 
        gameRunning = true;
        
        audio.play();
        for (let i = 0; i < 6; i++) {
            spawnTile(canvas.height - (i * 250) - 500);
        }
        gameLoop();
    }

    function spawnTile(yPos) {
        const lane = Math.floor(Math.random() * 4);
        tiles.push({ x: lane * laneWidth, y: yPos, w: laneWidth, h: 250, hit: false });
    }

    function gameLoop() {
        if (!gameRunning) return;
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Vertical Grid
        ctx.strokeStyle = '#eee';
        for (let i = 1; i < 4; i++) {
            ctx.beginPath(); ctx.moveTo(i * laneWidth, 0); ctx.lineTo(i * laneWidth, canvas.height); ctx.stroke();
        }

        for (let i = tiles.length - 1; i >= 0; i--) {
            let t = tiles[i];
            t.y += speed;

            ctx.fillStyle = t.hit ? '#ccc' : '#000';
            ctx.fillRect(t.x, t.y, t.w, t.h);

            if (t.y > canvas.height && !t.hit) gameOver();

            if (t.y > canvas.height) {
                tiles.splice(i, 1);
                spawnTile(tiles[0].y - 250);
                speed += 0.02;
            }
        }
        requestAnimationFrame(gameLoop);
    }

    // TAP HANDLING
    const handlePress = (ex, ey) => {
        if (!gameRunning) return;
        let target = null;
        let lowY = -1;
        
        // Find the lowest unhit tile
        tiles.forEach(t => {
            if(!t.hit && (t.y + t.h) > lowY) {
                target = t;
                lowY = t.y + t.h;
            }
        });

        if (target && ex >= target.x && ex <= target.x + target.w && ey >= target.y && ey <= target.y + target.h) {
            target.hit = true;
            score++;
            scoreEl.innerText = score;
        } else {
            gameOver();
        }
    };

    // Use touchstart for zero-latency on mobile
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handlePress(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive: false});

    canvas.addEventListener('mousedown', (e) => handlePress(e.clientX, e.clientY));

    function gameOver() {
        gameRunning = false;
        audio.pause();
        document.getElementById('final-score').innerText = "SCORE: " + score;
        deathScreen.classList.remove('hidden');
    }

    function goHome() {
        deathScreen.classList.add('hidden');
        homeScreen.classList.remove('hidden');
    }

    audioInput.onchange = (e) => {
        const file = e.target.files[0];
        currentSongUrl = URL.createObjectURL(file);
        startGame();
    };

    window.addEventListener('resize', resize);
    init();
</script>
</body>
</html>
