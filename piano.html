<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goated Tiles v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        #menu { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; z-index: 10; font-family: sans-serif; }
        .song-btn { width: 80%; padding: 15px; margin: 5px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="letter-spacing: 4px;">PIANO TILES</h1>
    <div id="library" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        </div>
</div>

<script>
let mySound;
let amp;
let tiles = [];
let score = 0;
let gameState = "MENU"; // MENU, PLAYING, GAMEOVER
let currentLane = 0;
let speed = 7;

// --- YOUR GITHUB SONGS ---
const mySongs = [
    { name: "KANYE - POWER", url: "./power.mp3" },
    { name: "UPLOADED TRACK", url: "./song2.mp3" }
];

function setup() {
    createCanvas(windowWidth, windowHeight);
    amp = new p5.Amplitude();
    
    // Build the menu buttons
    const lib = document.getElementById('library');
    mySongs.forEach(s => {
        let btn = document.createElement('button');
        btn.className = "song-btn";
        btn.innerText = s.name;
        btn.onclick = () => loadAndStart(s.url);
        lib.appendChild(btn);
    });
}

function loadAndStart(url) {
    if (mySound) mySound.stop();
    // Show a "Loading" state
    document.getElementById('menu').innerHTML = "<h1>LOADING...</h1>";
    
    mySound = loadSound(url, () => {
        document.getElementById('menu').style.display = "none";
        resetGame();
    });
}

function resetGame() {
    tiles = [];
    score = 0;
    speed = 8;
    gameState = "PLAYING";
    currentLane = floor(random(4));
    tiles.push(new Tile(currentLane));
    mySound.play();
}

class Tile {
    constructor(lane) {
        this.lane = lane;
        this.w = width / 4;
        this.h = height / 5;
        this.x = this.lane * this.w;
        this.y = -this.h;
        this.hit = false;
    }

    move() {
        this.y += speed;
    }

    show() {
        fill(this.hit ? 200 : 0);
        stroke(100);
        rect(this.x, this.y, this.w, this.h);
    }

    isOffScreen() {
        return this.y > height;
    }
}

function draw() {
    if (gameState !== "PLAYING") return;
    background(255);

    // Draw grid lines
    stroke(220);
    for (let i = 1; i < 4; i++) {
        line(i * width / 4, 0, i * width / 4, height);
    }

    // Handle Tiles
    for (let i = tiles.length - 1; i >= 0; i--) {
        let t = tiles[i];
        t.move();
        t.show();

        // Check if missed
        if (t.isOffScreen() && !t.hit) {
            triggerGameOver();
        }

        // Remove old tiles
        if (t.isOffScreen()) {
            tiles.splice(i, 1);
        }
    }

    // Spawn Logic (Fixed Spacing)
    if (tiles.length > 0) {
        let lastTile = tiles[tiles.length - 1];
        if (lastTile.y > 0) {
            currentLane = floor(random(4));
            tiles.push(new Tile(currentLane));
            speed += 0.01; // Scale difficulty
        }
    }

    // UI
    fill(0, 150);
    noStroke();
    textSize(50);
    textAlign(CENTER);
    text(score, width / 2, 80);
}

function mousePressed() {
    if (gameState !== "PLAYING") return;

    let hitSomething = false;
    // Find the lowest unhit tile
    for (let t of tiles) {
        if (!t.hit && mouseX > t.x && mouseX < t.x + t.w && mouseY > t.y && mouseY < t.y + t.h) {
            t.hit = true;
            score++;
            hitSomething = true;
            break;
        }
    }

    if (!hitSomething) {
        triggerGameOver();
    }
}

function triggerGameOver() {
    gameState = "GAMEOVER";
    mySound.stop();
    alert("FAILED! Score: " + score);
    location.reload(); // Quickest way to go back to menu
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
