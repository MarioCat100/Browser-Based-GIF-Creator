<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="goatedpiano.png?v=1">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goated Tiles</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; z-index: 10; }
        .hidden { display: none !important; }
        .btn { width: 80%; max-width: 300px; padding: 20px; margin: 10px; background: #000; color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; }
       #song-list { 
        width: 90%; 
        max-width: 400px;
        height: 300px; /* Limits the height so it doesn't eat the whole page */
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        overflow-y: auto; /* Adds a scrollbar if there are too many songs */
        background: #f4f4f4;
        border-radius: 15px;
        padding: 10px;
        border: 2px solid #000;
    }

    /* Makes the scrollbar look cleaner on Chrome/Safari */
    #song-list::-webkit-scrollbar {
        width: 8px;
    }
    #song-list::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 10px;
    }
    </style>
</head>
<body>

<div id="home-screen" class="overlay">
    <h1 style="letter-spacing: 5px;">GOATED TILES test47</h1>
    <div id="song-list"></div>
</div>

<div id="death-screen" class="overlay hidden">
    <h1 id="fail-text">FAILED</h1>
    <h2 id="final-score">SCORE: 0</h2>
    <button id="continue-btn" class="btn" style="background:#9b59b6" onclick="handleRevive()">CONTINUE</button>
    <button class="btn" onclick="restartGame()">RESTART</button>
    <button class="btn" style="background:#666" onclick="goHome()">HOME</button>
</div>

<script>
let canContinue = false; // Default is OFF (Normal Mode)  
let combo = 0;    
let isProMode = false; // Starts off by default    
let controlMode = "CLICK"; // Start in mobile/mouse mode    
let currentPulseColor = [255, 255, 255]; // Defaults to white    
let pulseMode = false; // Default is Classic (false)    
let feedbackText = "";
let feedbackColor = "#fff";
let feedbackTimer = 0;    
let mySound, amp, tiles = [], score = 0, gameState = "MENU";
let currentSongUrl = "", speed = 6, alpha = 0;

const mySongs = [
    { name: "Legendary Lovers", url: "./Legendary Lovers.mp3", color: [255, 182, 193] }, // Soft Pink
    { name: "Wheels Fall OFF", url: "./Wheels Fall Off.mp3", color: [255, 215, 0] },   // Gold
    { name: "Tom Cruise", url: "./Tom Cruise.mp3", color: [135, 206, 235] },          // Sky Blue (current)
    { name: "3005", url: "./3005.mp3", color: [147, 112, 219] },                     // Deep Purple
    { name: "Rather Lie", url: "./RATHER LIE.mp3", color: [173, 216, 230] },           // Light Blue
     { name: "Do It", url: "./DO IT.mp3", color: [255, 102, 0] },                         // Orange
    { name: "Dark Thoughts", url: "./Dark Thoughts.mp3", color: [25, 25, 112] },            // Midnight Blue
    { name: "Wavy", url: "./Wavy.mp3", color: [0, 191, 255] },
     { name: "Jennifer", url: "./Jennifer.mp3", color: [0, 71, 49] },                        //Deep Green
    { name: "My Way - Fetty Wap", url: "./My Way.mp3", color: [106, 13, 173] },                //classic purple
    { name: "Kill Bill", url: "./Kill Bill.mp3", color: [38, 89, 229] },                        // Deep Blue
    { name: "All The Love", url: "./ALL THE LOVE.mp3", color: [255, 140, 0] },                    // dark orange
    { name: "Scott and Zelda", url: "./Scott and Zelda.mp3", color: [255, 0, 127] },                //hot pink
    { name: "Jocelyn Flores", url: "./Jocelyn Flores.mp3", color: [100, 110, 140] },                // muted slate bluee
    { name: "Magnetic", url: "./Magnetic.mp3", color: [160, 255, 210] },                            // glowing mint
     { name: "Nicotine Patches", url: "./Nicotine Patches.mp3", color: [160, 0, 0] },                // Blood Red
];

function setup() {
    createCanvas(windowWidth, windowHeight);
    
    const home = document.getElementById('home-screen');
    
    // We'll use your existing 'canContinue' variable here
    home.innerHTML = `
        <h1 style="letter-spacing: 5px; margin-top: 50px;">GOATED TILES</h1>
        
        <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; width: 95%; margin-left: auto; margin-right: auto;">
            <button class="btn" onclick="togglePulse()" 
                style="background: ${pulseMode ? '#2ecc71' : '#666'}; width: 85px; padding: 10px; font-size: 12px;">
                VFX: ${pulseMode ? 'ON' : 'OFF'}
            </button>

            <button class="btn" onclick="togglePro()" 
                style="background: ${isProMode ? '#f1c40f' : '#666'}; width: 85px; padding: 10px; font-size: 12px; color: ${isProMode ? '#000' : '#fff'};">
                PRO: ${isProMode ? 'ON' : 'OFF'}
            </button>

            <button class="btn" onclick="togglePractice()" 
                style="background: ${canContinue ? '#9b59b6' : '#666'}; width: 85px; padding: 10px; font-size: 11px;">
                PRACTICE: ${canContinue ? 'ON' : 'OFF'}
            </button>
            
            <button class="btn" onclick="toggleControls()" 
                style="background: #3498db; width: 85px; padding: 10px; font-size: 12px;">
                ${controlMode}
            </button>
        </div>

        <div id="song-list"></div>
    `;

    const list = document.getElementById('song-list');
    list.innerHTML = ""; 

    mySongs.forEach(s => {
        let savedBest = localStorage.getItem("best_" + s.url) || 0;
        let btn = document.createElement('button');
        btn.className = "btn";
        btn.innerHTML = `${s.name}<br><span style="font-size: 12px; opacity: 0.7;">Best: ${savedBest}</span>`;
        
        btn.onclick = () => { 
            currentSongUrl = s.url; 
            currentPulseColor = s.color; 
            loadAndStart(); 
        };
        
        list.appendChild(btn);
    });

    amp = new p5.Amplitude();
}



// --- ADD THIS TO THE BOTTOM OF YOUR SCRIPT ---
function togglePractice() {
    isPracticeMode = !isPracticeMode;
    setup(); // This re-draws the menu to show the purple 'ON' color
}
function loadAndStart() {
    if (mySound) mySound.stop();
    document.getElementById('home-screen').innerHTML = "<h1>LOADING...</h1>";
    mySound = loadSound(currentSongUrl, () => {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('death-screen').classList.add('hidden');
        startGame();
    });
}

function startGame() {
    tiles = []; score = 0; speed = 6; frameCount = 0; gameState = "PLAYING";
    tiles.push(new Tile(floor(random(4))));
    mySound.play();
}

class Tile {
    constructor(lane) {
        this.lane = lane;
        this.w = width / 4;
        this.h = height / 5;
        this.x = this.lane * this.w;
        this.y = -this.h * 2;
        this.once = true;
    }
    move(v, a) { this.y += (v * speed) + a; }
    show() {
        fill(0); stroke(100);
        rect(this.x, this.y, this.w, this.h);
    }
}

function draw() {
    // 1. GAME STATE CHECK
    if (gameState !== "PLAYING") return;

    // 2. DYNAMIC BACKGROUND (Pulse Logic)
    if (pulseMode) {
        let vol = amp.getLevel();
        let r = currentPulseColor[0];
        let g = currentPulseColor[1];
        let b = currentPulseColor[2];

        let pR = map(vol, 0, 0.3, 255, r);
        let pG = map(vol, 0, 0.3, 255, g);
        let pB = map(vol, 0, 0.3, 255, b);
        background(pR, pG, pB);
    } else {
        background(255);
    }
    
    alpha = frameCount / 200; 
    let vol = amp.getLevel();
    let varR = vol < 0.2 ? 0.8 : map(vol, 0.4, 1, 0.8, 1.2);

    // 3. GRID
    stroke(220);
    for (let i = 1; i < 4; i++) line(i * width/4, 0, i * width/4, height);

    // 4. TILES (With Pro Multiplier)
    let proMultiplier = isProMode ? 1.8 : 1.0; 

    for (let i = tiles.length - 1; i >= 0; i--) {
        let t = tiles[i];
        t.move(varR * proMultiplier, alpha); 
        t.show();

        if (t.y > -t.h + 5 && t.once) {
            t.once = false;
            tiles.push(new Tile(floor(random(4))));
        }

        if (t.y > height) {
            combo = 0; // RESET COMBO IF TILE PASSES
            triggerGameOver();
        }
    }

    // 5. SCORE & FEEDBACK & COMBO (The HUD)
    // --- THE SCORE ---
    fill(255, 0, 0); 
    noStroke();
    textSize(50);
    textAlign(CENTER);
    text(score, width / 2, 80);

    // --- THE COMBO & MULTIPLIER ---
    if (combo > 1) {
        // Shake based on music volume (Juice!)
        let shake = map(vol, 0, 0.3, 0, 8); 
        fill(255, 215, 0); // Gold
        
        // Text size grows as combo goes up
        textSize(min(30 + combo, 70)); 
        text("x" + combo, width / 2 + random(-shake, shake), 140);
        
        // NEW: MULTIPLIER LOGIC (Every 10 hits)
        let m = floor(combo / 10) + 1;
        if (m > 1) {
            textSize(20);
            text(m + "X POINTS", width / 2, 190);
        }

        // DYNAMIC RANKS
        let rank = "CLEAN";
        if (combo > 15) rank = "CRISP";
        if (combo > 30) rank = "GOATED";
        
        textSize(15);
        fill(255); // White for the rank text
        text(rank, width / 2, 165);
    }

    // --- THE FEEDBACK (PERFECT/GOOD) ---
    if (feedbackTimer > 0) {
        fill(feedbackColor);
        textSize(40);
        text(feedbackText, width / 2, height / 2 + 50);
        feedbackTimer--; 
    }

    // 6. THE PRO BUTTON
    rectMode(CORNER); 
    fill(isProMode ? "#FFD700" : 200); 
    stroke(0);
    strokeWeight(2);
    rect(20, 20, 80, 40, 5); 

    fill(0);
    noStroke();
    textSize(16);
    textAlign(CENTER, CENTER);
    text("PRO", 60, 40); 
}
// INPUT HANDLING
function mousePressed() {
    if (gameState !== "PLAYING") return;
    if (getAudioContext().state !== 'running') getAudioContext().resume();
    let clickedLane = floor(mouseX / (width / 4));
    checkHit(clickedLane);
}

function keyPressed() {
    if (gameState !== "PLAYING") return;
    if (getAudioContext().state !== 'running') getAudioContext().resume();

    let targetLane = -1;
    // Standard WASD / Arrow Mapping
    if (key === 'a' || key === 'A' || keyCode === LEFT_ARROW)  targetLane = 0;
    if (key === 's' || key === 'S' || keyCode === UP_ARROW)    targetLane = 1;
    if (key === 'w' || key === 'W' || keyCode === DOWN_ARROW)  targetLane = 2;
    if (key === 'd' || key === 'D' || keyCode === RIGHT_ARROW) targetLane = 3; 

    // We no longer need to pass 'true' here!
    if (targetLane !== -1) checkHit(targetLane);
}
    function touchStarted() {
    if (gameState !== "PLAYING") return;
    if (getAudioContext().state !== 'running') getAudioContext().resume();

    // Map the horizontal touch position to one of the 4 lanes
    let targetLane = floor(map(mouseX, 0, width, 0, 4));
    
    if (targetLane >= 0 && targetLane <= 3) {
        checkHit(targetLane);
    }
    return false; // This prevents the screen from scrolling while you play
}

function checkHit(lane) {
    let t = tiles[0]; 
    
    if (t && t.lane === lane) {
        let isTouching = (controlMode === "KEYBOARD") || (mouseY >= t.y && mouseY <= t.y + t.h);

        if (isTouching) {
            if (t.y + t.h > 100) {
                let distFromBottom = abs(height - (t.y + t.h));

                // NEW: Every 10 hits, your points per note increase (1x, 2x, 3x...)
                let multiplier = floor(combo / 10) + 1; 

                if (distFromBottom < 60) { 
                    score += (2 * multiplier); // Points scale with your streak!
                    combo++; 
                    showFeedback("PERFECT x" + multiplier, "#f1c40f"); 
                } else {
                    score += (1 * multiplier);
                    combo++; 
                    showFeedback("GOOD x" + multiplier, "#2ecc71"); 
                }
                
                tiles.splice(0, 1);

            } else {
                // TOO EARLY: Reset streak but keep playing if you want 
                // (Or keep it as game over if you prefer)
                combo = 0; 
                score = max(0, score - 5); 
                showFeedback("TOO EARLY!", "#e74c3c"); 
            }

        } else {
            combo = 0; 
            triggerGameOver();
        }

    } else {
        combo = 0; 
        triggerGameOver();
    }
}
function triggerGameOver() {
    gameState = "GAMEOVER";
    if (mySound) mySound.pause(); // Pause so we can resume later!

    // --- 1. PRACTICE MODE UI CHECK ---
    const contBtn = document.getElementById('continue-btn');
    if (canContinue) {
        contBtn.classList.remove('hidden'); // Show the Purple Resume button
    } else {
        contBtn.classList.add('hidden');    // Hide it for Normal Mode
    }

    // --- 2. YOUR ORIGINAL HIGH SCORE LOGIC (Kept exactly as requested) ---
    let scoreKey = "best_" + currentSongUrl; 
    let previousBest = parseInt(localStorage.getItem(scoreKey)) || 0;
    let isNewRecord = false;

    if (score > previousBest) {
        localStorage.setItem(scoreKey, score);
        isNewRecord = true;
    }

    let failText = isNewRecord ? "NEW HIGH SCORE!" : "FAILED";
    document.getElementById('fail-text').innerText = failText;
    document.getElementById('fail-text').style.color = isNewRecord ? "#2ecc71" : "#e74c3c"; 
    
    document.getElementById('final-score').innerHTML = `
        SCORE: ${score}<br>
        <span style="font-size: 18px; color: #666;">BEST: ${isNewRecord ? score : previousBest}</span>
    `;
    
    document.getElementById('death-screen').classList.remove('hidden');
}
function restartGame() {
    document.getElementById('death-screen').classList.add('hidden');
    startGame();
}

function goHome() {
    // 1. Kill the music and reset state
    if (mySound) mySound.stop();
    gameState = "MENU";
    
    // 2. Hide the Death Screen 
    document.getElementById('death-screen').classList.add('hidden');
    
    // 3. Show the Home Screen container
    const home = document.getElementById('home-screen');
    home.classList.remove('hidden');
    
    // 4. Let setup() do ALL the heavy lifting
    // It will check if pulseMode is true/false and draw the button correctly
    setup();
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
function showFeedback(txt, col) {
    feedbackText = txt;
    feedbackColor = col;
    feedbackTimer = 25; 
}
    function togglePulse() {
    pulseMode = !pulseMode; // Flips the switch
    setup(); // Re-runs the function above to update the button color
}
    // 2. Toggle for the Input System
function toggleControls() {
    controlMode = (controlMode === "CLICK") ? "KEYBOARD" : "CLICK";
    setup(); // Re-render menu to update button text
}
   function togglePro() {
    isProMode = !isProMode; // Flip the true/false
    console.log("Pro Mode is now: " + isProMode);
    setup(); // <--- THIS RE-DRAWS THE MENU WITH THE NEW COLOR
}
    function togglePractice() {
    canContinue = !canContinue; 
    console.log("Practice Mode is now: " + canContinue);
    setup(); // This RE-DRAWS the home screen with the new color
}
</script>
</body>
</html>
