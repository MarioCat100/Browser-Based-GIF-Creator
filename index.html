<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOATED GIF CREATOR</title>
  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Favicon neon generation -->
  <canvas id="favicon-canvas" width="32" height="32" style="display:none"></canvas>
  <script>
    const canvas = document.getElementById("favicon-canvas");
    const ctx = canvas.getContext("2d");

    // black background
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, 32, 32);

    // neon blue glowing circle
    const gradient = ctx.createRadialGradient(16,16,5,16,16,16);
    gradient.addColorStop(0, "#0ff");
    gradient.addColorStop(1, "rgba(0,255,255,0)");

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(16,16,10,0,Math.PI*2);
    ctx.fill();

    // create favicon link
    const link = document.createElement("link");
    link.rel = "icon";
    link.type = "image/png";
    link.href = canvas.toDataURL("image/png");
    document.head.appendChild(link);
  </script>
</head>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Browser-Based GIF Creator</h1>
  <p>Drag, drop, or paste images to create a .GIF file</p>

  <!-- Animated circles container -->
  <div class="container">
    <div class="circle" style="--i:0;"></div>
    <div class="circle" style="--i:1;"></div>
    <div class="circle" style="--i:2;"></div>
    <div class="circle" style="--i:3;"></div>
    <div class="circle" style="--i:4;"></div>
    <div class="circle" style="--i:5;"></div>
    <div class="circle" style="--i:6;"></div>
    <div class="circle" style="--i:7;"></div>
    <div class="circle" style="--i:8;"></div>
    <div class="circle" style="--i:9;"></div>
    <div class="circle" style="--i:10;"></div>
    <div class="circle" style="--i:11;"></div>
    <div class="circle" style="--i:12;"></div>
    <div class="circle" style="--i:13;"></div>
    <div class="circle" style="--i:14;"></div>
    <div class="circle" style="--i:15;"></div>
    <div class="circle" style="--i:16;"></div>
    <div class="circle" style="--i:17;"></div>
    <div class="circle" style="--i:18;"></div>
    <div class="circle" style="--i:19;"></div>
    <div class="circle" style="--i:20;"></div>
  </div>

  <!-- Drag-and-drop box -->
  <div class="drop-box" id="drop-box">
    <p>Drag & Drop Images Here</p>
    <input type="file" id="file-input" multiple />
  </div>

  <!-- Neon button -->
  <button class="neon-button" id="create-btn">Create GIF</button>

  <!-- Preview -->
  <div id="preview"></div>

  <!-- gif-wasm library -->
  <script src="https://cdn.jsdelivr.net/npm/gifski-wasm@2.2.0/dist/gifski.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
